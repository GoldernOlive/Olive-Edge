<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opportunity Finder — Olive Edge</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="fu">
    <div class="page-title serif">🔥 Opportunity Finder</div>
    <div class="page-sub">Etsy · Printify · Printful · Reddit · Groq AI — all real data combined</div>
  </div>
  <div class="card fu" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
    <div style="flex:1;min-width:220px">
      <div class="lbl">Keyword or Product Idea</div>
      <input id="opp-kw" placeholder="e.g. custom mug, pet portrait, wall art, tote bag..."/>
    </div>
    <div style="min-width:160px">
      <div class="lbl">Primary Market</div>
      <select id="opp-market">
        <option value="GB">UK (Primary)</option>
        <option value="US">USA</option>
        <option value="DE">Germany</option>
        <option value="AU">Australia</option>
        <option value="CA">Canada</option>
        <option value="FR">France</option>
      </select>
    </div>
    <button class="btn-olive" onclick="doOpportunity()">Find Opportunity</button>
  </div>
  <div style="margin-bottom:14px"><div class="lbl">Quick Ideas</div><div id="quick-chips"></div></div>
  <div class="card" style="padding:12px">
    <div class="lbl" style="margin-bottom:8px">Data Sources</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="badge" id="src-etsy" style="background:var(--p2);color:var(--mu);border:1px solid var(--b1)">Etsy: Pending</span>
      <span class="badge b-live" id="src-printify">Printify Loading...</span>
      <span class="badge b-live" id="src-printful">Printful Loading...</span>
      <span class="badge" id="src-reddit" style="background:var(--p2);color:var(--mu);border:1px solid var(--b1)">Reddit</span>
      <span class="badge b-gold" id="src-ai">Groq AI Ready</span>
    </div>
  </div>
  <div id="opp-result"></div>
</div>
<script src="js/auth.js"></script>
<script>
requireAuth();
document.getElementById('nav-placeholder').innerHTML=renderNav('opportunities.html');

window.onload=function(){
  var chips=['custom mug','pet portrait','wall art print','tote bag','wedding invitation','candle gift','baby nursery art','funny slogan shirt','digital planner','personalised keyring','die cut sticker','motivational poster'];
  var el=document.getElementById('quick-chips');
  if(el){
    var html='';
    for(var i=0;i<chips.length;i++){
      html+='<button class="btn-chip" onclick="runChip(\''+chips[i]+'\')">'+chips[i]+'</button>';
    }
    el.innerHTML=html;
  }
  var urlKw=new URLSearchParams(window.location.search).get('kw');
  if(urlKw){document.getElementById('opp-kw').value=urlKw;doOpportunity();}
};

function runChip(k){document.getElementById('opp-kw').value=k;doOpportunity();}

function getKeys(){return{etsy:localStorage.getItem('oe_etsy')||'',groq:localStorage.getItem('oe_groq')||''};}

function setBadge(id,ok,label){
  var el=document.getElementById(id);if(!el)return;
  el.textContent=label;
  el.className=ok?'badge b-live':'badge';
  if(!ok){el.style.background='var(--p2)';el.style.color='var(--mu)';el.style.border='1px solid var(--b1)';}
}

function platformLinks(kw){
  var k=encodeURIComponent(kw);
  var links=[
    {name:'Etsy UK',color:'#f1641e',url:'https://www.etsy.com/uk/search?q='+k,icon:'🛍'},
    {name:'Etsy USA',color:'#f1641e',url:'https://www.etsy.com/search?q='+k,icon:'🛍'},
    {name:'Etsy Germany',color:'#f1641e',url:'https://www.etsy.com/de/search?q='+k,icon:'🛍'},
    {name:'Etsy Australia',color:'#f1641e',url:'https://www.etsy.com/au/search?q='+k,icon:'🛍'},
    {name:'Printify',color:'#2a4a7a',url:'https://printify.com/app/products?search='+k,icon:'🖨'},
    {name:'Printful',color:'#3d3d3d',url:'https://www.printful.com/uk/custom/search?q='+k,icon:'🖨'},
    {name:'Gelato',color:'#e85d26',url:'https://www.gelato.com/gb/en/catalogue?q='+k,icon:'🖨'},
    {name:'Pinterest',color:'#e60023',url:'https://www.pinterest.co.uk/search/pins/?q='+k,icon:'📌'},
    {name:'Amazon UK',color:'#ff9900',url:'https://www.amazon.co.uk/s?k='+k,icon:'📦'},
    {name:'NOTHS',color:'#4a4a4a',url:'https://www.notonthehighstreet.com/search?search_term='+k,icon:'🎁'}
  ];
  var html='<div class="card" style="margin-bottom:16px;border:2px solid var(--olbr)">';
  html+='<div class="lbl" style="color:var(--ol)">🔗 See Real Products On Every Platform</div>';
  html+='<p style="font-size:12px;color:var(--mu);margin-bottom:12px">Click to see what is actually selling for <strong>'+kw+'</strong> right now</p>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  for(var i=0;i<links.length;i++){
    var l=links[i];
    html+='<a href="'+l.url+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--w);border:1.5px solid var(--b1);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--tx);text-decoration:none;font-family:Jost,sans-serif;">'+l.icon+' '+l.name+'</a>';
  }
  html+='</div></div>';
  return html;
}

async function callGroq(prompt){
  var keys=getKeys();
  if(!keys.groq){throw new Error('No Groq key');}
  var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+keys.groq},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[
      {role:'system',content:'Expert Etsy market analyst and POD strategist. Deep knowledge of Etsy UK/USA/Germany/Australia, Printify, Printful, Gelato, design trends, colour trends, font trends, what sells. Give specific numbers and concrete recommendations.'},
      {role:'user',content:prompt+'\n\nReturn ONLY valid raw JSON. No markdown. Start { end }'}
    ],temperature:0.2,max_tokens:3000})
  });
  var d=await r.json();
  if(!r.ok)throw new Error(d.error&&d.error.message||'Groq error');
  var t=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'';
  var s=t.indexOf('{'),e=t.lastIndexOf('}');
  if(s<0||e<0)throw new Error('No JSON returned — please try again');
  return JSON.parse(t.slice(s,e+1));
}

async function callEtsy(path){
  var keys=getKeys();if(!keys.etsy)throw new Error('No Etsy key');
  var r=await fetch('https://openapi.etsy.com/v3/application/'+path,{headers:{'x-api-key':keys.etsy}});
  if(!r.ok)throw new Error('Etsy '+r.status);
  return r.json();
}

async function getPrintify(kw){
  try{
    var r=await fetch('https://api.printify.com/v1/catalog/blueprints.json');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    setBadge('src-printify',true,'Printify '+(d||[]).length+' products');
    return(d||[]).filter(function(p){return p.title&&p.title.toLowerCase().includes(kl);}).slice(0,6);
  }catch(e){setBadge('src-printify',false,'Printify unavailable');return[];}
}

async function getPrintful(kw){
  try{
    var r=await fetch('https://api.printful.com/products');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    var results=d.result||[];
    setBadge('src-printful',true,'Printful '+results.length+' products');
    return results.filter(function(p){return p.type_name&&p.type_name.toLowerCase().includes(kl);}).slice(0,6);
  }catch(e){setBadge('src-printful',false,'Printful unavailable');return[];}
}

async function getReddit(kw){
  try{
    var r=await fetch('https://www.reddit.com/r/EtsySellers/search.json?q='+encodeURIComponent(kw)+'&sort=hot&limit=8&restrict_sr=1',{headers:{'Accept':'application/json'}});
    if(!r.ok)return[];
    var d=await r.json();
    var posts=(d.data&&d.data.children||[]).map(function(p){return{title:p.data.title,score:p.data.score,comments:p.data.num_comments,url:'https://reddit.com'+p.data.permalink};});
    setBadge('src-reddit',posts.length>0,'Reddit '+posts.length+' posts');
    return posts;
  }catch(e){setBadge('src-reddit',false,'Reddit unavailable');return[];}
}

async function doOpportunity(){
  var kw=document.getElementById('opp-kw').value.trim();
  if(!kw){alert('Please enter a keyword');return;}
  var res=document.getElementById('opp-result');

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Checking Printify and Printful catalogues...</div></div>';
  var pfy=await getPrintify(kw);
  var pfl=await getPrintful(kw);

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Fetching live Etsy listings...</div></div>';
  var etsyL=[],etsyT=[],etsyP={};
  var keys=getKeys();
  if(keys.etsy){
    try{
      var er=await callEtsy('listings/active?keywords='+encodeURIComponent(kw)+'&limit=50&sort_on=score');
      etsyL=er.results||[];
      var tm={};
      etsyL.forEach(function(l){(l.tags||[]).forEach(function(t){tm[t]=(tm[t]||0)+1;});});
      etsyT=Object.entries(tm).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{tag:e[0],count:e[1]};});
      var pp=etsyL.map(function(l){return(l.price&&l.price.amount||0)/100;}).filter(function(p){return p>0;}).sort(function(a,b){return a-b;});
      if(pp.length)etsyP={min:pp[0].toFixed(2),max:pp[pp.length-1].toFixed(2),avg:(pp.reduce(function(s,p){return s+p;},0)/pp.length).toFixed(2),median:pp[Math.floor(pp.length/2)].toFixed(2)};
      setBadge('src-etsy',true,'Etsy '+etsyL.length+' live listings');
    }catch(e){setBadge('src-etsy',false,'Etsy: '+e.message);}
  }

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Scanning Reddit r/EtsySellers...</div></div>';
  var reddit=await getReddit(kw);

  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Running AI analysis across all data sources...</div></div>';

  var etsyCtx=etsyL.length
    ?'LIVE ETSY '+etsyL.length+' listings. Prices from £'+etsyP.min+' to £'+etsyP.max+' avg £'+etsyP.avg+'. Top tags: '+etsyT.slice(0,12).map(function(t){return t.tag+'(x'+t.count+')';}).join(', ')
    :'No live Etsy data yet. Use your Etsy expertise for this niche.';
  var pfyCtx=pfy.length?'Printify real products: '+pfy.map(function(p){return p.title;}).join(', '):'';
  var pflCtx=pfl.length?'Printful real products: '+pfl.map(function(p){return p.type_name;}).join(', '):'';
  var rdCtx=reddit.length?'Reddit r/EtsySellers posts: '+reddit.slice(0,4).map(function(p){return '"'+p.title+'"';}).join(' | '):'';

  try{
    var d=await callGroq('Etsy opportunity analysis for "'+kw+'". UK primary. Also USA Germany Australia Canada France.\n'+etsyCtx+'\n'+pfyCtx+'\n'+pflCtx+'\n'+rdCtx+'\nReturn JSON: {"keyword":"'+kw+'","opportunityScore":7.5,"demandScore":8,"competitionScore":4,"marginScore":7,"saturationLevel":"Medium","verdict":"BUY IN","verdictReason":"one specific sentence","competingShops":"~X,XXX","estimatedMonthlySearches":"X,XXX-XX,XXX","fastGrowingAngle":"what winning new shops do differently","marketInsight":{"totalListings":"~X,XXX","reviewDensity":"X%","priceBand":"£X-£Y","weakCompetitors":"description","gapDetected":"specific gap","hotOnReddit":"what sellers discuss","redditInsight":"key insight"},"sellThisNow":{"product":"exact product","format":"mug","platform":"Printify","baseCost":"£X","ukPrice":"£X","usaPrice":"$X","germanyPrice":"€X","australiaPrice":"AU$X","margin":"X%","bestColours":["Sage Green","Cream","Black"],"colourHexes":["#7C9A7E","#F5F0E8","#1A1A1A"],"bestFontStyle":"Script","fontReason":"why this font sells","bestDesignStyle":"Minimalist","designReason":"why this style wins","bestPhrase":"exact phrase","phraseEmotion":"sentimental","designBrief":"3 sentence design instructions","imageStyle":"Lifestyle"},"visualIntel":{"topColours":[{"name":"colour","hex":"#RRGGBB","popularity":70,"where":"background","hotMarkets":["UK","USA"]}],"topFontStyles":[{"style":"Script","popularity":58,"mood":"elegant","bestFor":["mugs"],"examples":"Playfair"}],"topDesignStyles":[{"style":"Minimalist","popularity":62,"desc":"clean text","popularIn":["UK","Germany"]}],"topPhrases":[{"phrase":"winning phrase","frequency":42,"emotion":"sentimental","markets":["UK","USA"]}],"risingPhrases":["rising1","rising2"],"saturatedPhrases":["avoid1"]},"topTags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10","tag11","tag12","tag13"],"tagIntel":[{"tag":"tag1","competition":"Low","searchVolume":"High","recommended":true,"why":"reason"}],"titleFormula":"[Adj] [Product] | [Keyword] Gift","descriptionOpener":"Two sentences.","seoKeywords":["kw1","kw2","kw3"],"globalDemand":{"UK":80,"USA":90,"Germany":60,"Australia":55,"Canada":50,"France":40},"marketGaps":[{"market":"UK","gap":"specific gap","action":"exact action"},{"market":"USA","gap":"specific gap","action":"exact action"}],"seasonality":[{"month":"Jan","score":40},{"month":"Feb","score":55},{"month":"Mar","score":60},{"month":"Apr","score":55},{"month":"May","score":60},{"month":"Jun","score":55},{"month":"Jul","score":50},{"month":"Aug","score":60},{"month":"Sep","score":65},{"month":"Oct","score":75},{"month":"Nov","score":88},{"month":"Dec","score":92}],"podComparison":[{"platform":"Printify","product":"product","baseCost":"£X","ukSellPrice":"£X","margin":"X%","pro":"advantage","con":"disadvantage"},{"platform":"Printful","product":"product","baseCost":"£X","ukSellPrice":"£X","margin":"X%","pro":"advantage","con":"disadvantage"},{"platform":"Gelato","product":"product","baseCost":"£X","ukSellPrice":"£X","margin":"X%","pro":"advantage","con":"disadvantage"}],"relatedProducts":["p1","p2","p3"],"adjacentNiches":["n1","n2","n3"],"bundleIdeas":["bundle1","bundle2"],"warnings":["warning1","warning2"],"opportunities":["opp1","opp2","opp3"]}');

    setBadge('src-ai',true,'Groq AI Done');
    renderFull(d,kw,etsyL,etsyT,etsyP,reddit,pfy,pfl);
  }catch(e){
    res.innerHTML='<div class="card-red"><strong>Analysis failed:</strong> '+e.message+'</div>';
  }
}

function sbox(l,v,c){return '<div class="sbox"><div class="lbl">'+l+'</div><div class="mono" style="font-size:16px;color:'+(c||'var(--tx)')+';font-weight:600">'+(v||'--')+'</div></div>';}
function pbar(p,c,h){h=h||5;return '<div class="pbar" style="height:'+h+'px"><div class="pbf" style="width:'+Math.min(100,p||0)+'%;background:'+(c||'var(--gd)')+';height:'+h+'px"></div></div>';}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n||0);}
function compColor(c){return c==='Low'?'var(--gn)':c==='Medium'?'var(--gd)':c==='High'?'var(--or)':'var(--rd)';}

function renderFull(d,kw,etsyL,etsyT,etsyP,reddit,pfy,pfl){
  var res=document.getElementById('opp-result');
  var sc=d.opportunityScore||7;
  var scClass=sc>=7?'score-high':sc>=5?'score-mid':'score-low';
  var verdictColors={'BUY IN':'var(--gn)','WORTH TESTING':'var(--gd)','PROCEED WITH CAUTION':'var(--or)','AVOID':'var(--rd)'};
  var vColor=verdictColors[d.verdict]||'var(--gd)';
  var html='';

  html+=platformLinks(kw);

  html+='<div class="card-live fu">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px">';
  html+='<div style="flex:1"><div class="serif" style="font-size:34px;font-weight:600;margin-bottom:10px">'+d.keyword+'</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">';
  html+='<span style="background:'+vColor+'18;color:'+vColor+';border:1px solid '+vColor+'44;border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700">'+d.verdict+'</span>';
  if(etsyL.length)html+='<span class="badge b-live">'+etsyL.length+' Live Etsy Listings</span>';
  if(reddit.length)html+='<span class="badge" style="background:#fff4f0;color:#cc4400;border:1px solid #ffb0a0">Reddit '+reddit.length+' posts</span>';
  html+='</div><p style="font-size:14px;color:var(--mu);line-height:1.7">'+d.verdictReason+'</p></div>';
  html+='<div class="score-ring '+scClass+'" style="width:88px;height:88px;font-size:26px;font-weight:700">'+sc+'</div></div>';
  html+='<div class="grid-auto" style="margin-bottom:14px">';
  html+=sbox('Demand',d.demandScore+'/10',d.demandScore>=7?'var(--ol)':d.demandScore>=5?'var(--gd)':'var(--rd)');
  html+=sbox('Competition',d.competitionScore+'/10',d.competitionScore<=4?'var(--gn)':d.competitionScore<=6?'var(--gd)':'var(--rd)');
  html+=sbox('Margin Score',d.marginScore+'/10','var(--gd)');
  html+=sbox('Saturation',d.saturationLevel,compColor(d.saturationLevel));
  html+=sbox('Competing Shops',d.competingShops,'var(--mu)');
  html+=sbox('Monthly Searches',d.estimatedMonthlySearches,'var(--bl)');
  html+='</div>';
  if(etsyL.length)html+='<div class="grid-auto" style="margin-bottom:14px">'+sbox('Live Min','£'+etsyP.min,'var(--gn)')+sbox('Live Avg','£'+etsyP.avg,'var(--gd)')+sbox('Live Max','£'+etsyP.max,'var(--rd)')+sbox('Live Median','£'+etsyP.median,'var(--ol)')+'</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<button class="btn-olive btn-sm" onclick="saveOpp()">+ Save to Workspace</button>';
  html+='<button class="btn-ghost btn-sm" onclick="exportOpp()">Export CSV</button></div></div>';

  html+='<div class="card d1"><div class="lbl">Market Insight</div><div class="grid-2">';
  html+='<div>'+sbox('Total Listings',d.marketInsight&&d.marketInsight.totalListings,'var(--mu)')+'<div style="margin-top:8px">'+sbox('Price Band',d.marketInsight&&d.marketInsight.priceBand,'var(--gd)')+'</div><div style="margin-top:8px">'+sbox('Review Density',d.marketInsight&&d.marketInsight.reviewDensity,'var(--bl)')+'</div></div>';
  html+='<div><div style="padding:12px;background:var(--olbg);border-radius:8px;border:1px solid var(--olbr);margin-bottom:8px"><div class="lbl" style="color:var(--ol)">GAP DETECTED</div><p style="font-size:13px;line-height:1.6;font-weight:600">'+(d.marketInsight&&d.marketInsight.gapDetected||'')+'</p></div>';
  html+='<div style="padding:12px;background:var(--p2);border-radius:8px"><div class="lbl">Weak Competitors</div><p style="font-size:12px;color:var(--mu);line-height:1.5">'+(d.marketInsight&&d.marketInsight.weakCompetitors||'')+'</p></div></div></div>';
  if(d.marketInsight&&d.marketInsight.hotOnReddit)html+='<div style="margin-top:10px;padding:12px;background:#fff4f0;border:1px solid #ffb0a0;border-radius:8px"><div class="lbl" style="color:#cc4400">Reddit r/EtsySellers</div><p style="font-size:13px;margin-bottom:4px">'+d.marketInsight.hotOnReddit+'</p><p style="font-size:12px;color:var(--mu);font-style:italic">'+d.marketInsight.redditInsight+'</p></div>';
  html+='<div style="margin-top:10px;padding:12px;background:var(--gdbg);border:1px solid var(--gdbr);border-radius:8px"><div class="lbl" style="color:var(--gd)">Fast Growing Angle</div><p style="font-size:13px;font-weight:600">'+d.fastGrowingAngle+'</p></div></div>';

  html+='<div class="card-gold d2"><div class="lbl" style="color:var(--gd)">SELL THIS NOW</div>';
  html+='<div class="serif" style="font-size:24px;font-weight:600;margin-bottom:16px">'+(d.sellThisNow&&d.sellThisNow.product||'')+'</div>';
  html+='<div class="grid-auto" style="margin-bottom:16px">'+sbox('Platform',d.sellThisNow&&d.sellThisNow.platform,'var(--bl)')+sbox('Base Cost',d.sellThisNow&&d.sellThisNow.baseCost,'var(--mu)')+sbox('UK',d.sellThisNow&&d.sellThisNow.ukPrice,'var(--gd)')+sbox('USA',d.sellThisNow&&d.sellThisNow.usaPrice,'var(--gd)')+sbox('Germany',d.sellThisNow&&d.sellThisNow.germanyPrice,'var(--gd)')+sbox('Australia',d.sellThisNow&&d.sellThisNow.australiaPrice,'var(--gd)')+sbox('Margin',d.sellThisNow&&d.sellThisNow.margin,'var(--ol)')+'</div>';
  html+='<div style="background:var(--olbg);border:1px solid var(--olbr);border-radius:10px;padding:16px"><div class="lbl" style="color:var(--ol)">DESIGN BRIEF</div>';
  html+='<div class="grid-2" style="margin-bottom:14px"><div><div class="lbl">Best Colours</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  var hexes=d.sellThisNow&&d.sellThisNow.colourHexes||['#7C9A7E','#F5F0E8','#1A1A1A'];
  for(var i=0;i<hexes.length;i++){html+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:36px;height:36px;border-radius:7px;background:'+hexes[i]+';border:1px solid rgba(0,0,0,.1)"></div><span style="font-size:9px;color:var(--mu);font-family:DM Mono,monospace">'+hexes[i]+'</span></div>';}
  html+='</div><div class="lbl">Font Style</div><div style="font-weight:700;color:var(--ol);font-size:16px;margin-bottom:4px">'+(d.sellThisNow&&d.sellThisNow.bestFontStyle||'')+'</div><div style="font-size:12px;color:var(--mu)">'+(d.sellThisNow&&d.sellThisNow.fontReason||'')+'</div></div>';
  html+='<div><div class="lbl">Design Style</div><div style="font-weight:700;color:var(--gd);font-size:16px;margin-bottom:4px">'+(d.sellThisNow&&d.sellThisNow.bestDesignStyle||'')+'</div><div style="font-size:12px;color:var(--mu);margin-bottom:12px">'+(d.sellThisNow&&d.sellThisNow.designReason||'')+'</div>';
  html+='<div class="lbl">Key Phrase</div><div style="font-family:Cormorant Garamond,serif;font-size:20px;font-style:italic;color:var(--gd);font-weight:600">"'+(d.sellThisNow&&d.sellThisNow.bestPhrase||'')+'"</div><div style="font-size:11px;color:var(--mu);margin-top:3px">'+(d.sellThisNow&&d.sellThisNow.phraseEmotion||'')+'</div></div></div>';

function copyTags(){
  var t=(window._oppData&&window._oppData.topTags||[]).join(', ');
  var btn=document.getElementById('copy-tags-btn');
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy All 13';},2000);}});}
  else{var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy All 13';},2000);}}
}

function saveOpp(){
  try{
    var kw=window._oppKw||'';
    var verdict=window._oppData&&window._oppData.verdict||'watch';
    var status=verdict.indexOf('BUY IN')>=0?'launch':verdict.indexOf('TESTING')>=0?'test':'watch';
    var s=getSession();
    dbInsert('workspace',{niche:kw,status:status,owner_id:s.userId,created_at:new Date().toISOString()}).then(function(){alert('Saved to Workspace!');}).catch(function(e){alert('Could not save: '+e.message);});
  }catch(e){alert('Error: '+e.message);}
}

function exportOpp(){
  if(!window._oppData)return;
  var d=window._oppData;
  var row={Keyword:window._oppKw,Score:d.opportunityScore,Verdict:d.verdict,Demand:d.demandScore,Competition:d.competitionScore,Platform:d.sellThisNow&&d.sellThisNow.platform,'UK Price':d.sellThisNow&&d.sellThisNow.ukPrice,Margin:d.sellThisNow&&d.sellThisNow.margin,Tags:(d.topTags||[]).join(', ')};
  csvExport([row],'opportunity-'+window._oppKw+'.csv');
}

function exportListings(){
  if(!window._etsyL||!window._etsyL.length)return;
  csvExport(window._etsyL.map(function(l){return{Title:l.title,Price:'£'+((l.price&&l.price.amount||0)/100).toFixed(2),Favorites:l.num_favorers||0,Shop:l.shop&&l.shop.shop_name||'',Tags:(l.tags||[]).join(', '),URL:l.url||''};}), 'listings-'+window._oppKw+'.csv');
}
