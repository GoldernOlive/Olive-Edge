<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Supplier Compare — Olive Edge</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="fu">
    <div class="page-title serif">💰 Supplier Compare</div>
    <div class="page-sub">Printify vs Printful vs Gelato — real base costs, margins and best regions</div>
  </div>
  <div class="card fu" style="display:flex;gap:10px;flex-wrap:wrap">
    <input id="sup-q" placeholder="Search product e.g. ceramic mug, unisex t-shirt, A4 art print, hoodie, tote bag..." style="flex:1" onkeydown="if(event.key==='Enter')doSupplier()"/>
    <button class="btn-olive" onclick="doSupplier()">Compare</button>
  </div>
  <div style="margin-bottom:14px">
    <div class="lbl">Quick Products</div>
    <div id="sup-chips"></div>
  </div>

  <div class="card-gold">
    <div class="lbl" style="color:var(--gd)">⚡ Live Profit Calculator</div>
    <div class="grid-auto" style="margin-bottom:14px">
      <div><div class="lbl">Base Cost (£)</div><input type="number" id="c-base" step="0.01" value="0" oninput="calcProfit()"/></div>
      <div><div class="lbl">UK Sell Price (£)</div><input type="number" id="c-uk" step="0.01" value="0" oninput="calcProfit()"/></div>
      <div><div class="lbl">USA Price ($)</div><input type="number" id="c-us" step="0.01" value="0" oninput="calcProfit()"/></div>
      <div><div class="lbl">EU Price (€)</div><input type="number" id="c-eu" step="0.01" value="0" oninput="calcProfit()"/></div>
      <div><div class="lbl">Etsy Ads (£)</div><input type="number" id="c-ads" step="0.01" value="0" oninput="calcProfit()"/></div>
    </div>
    <div id="calc-out" class="grid-auto"></div>
  </div>

  <div id="sup-res"></div>
</div>
<script src="js/auth.js"></script>
<script>
requireAuth();
document.getElementById('nav-placeholder').innerHTML=renderNav('suppliers.html');

window.onload=function(){
  var chips=['ceramic mug 11oz','unisex t-shirt','tote bag canvas','A4 art print','phone case','hoodie','canvas print','greeting card','throw pillow','sticker sheet','water bottle','sweatshirt'];
  var el=document.getElementById('sup-chips');
  if(el){var h='';for(var i=0;i<chips.length;i++){h+='<button class="btn-chip" onclick="runChip(\''+chips[i]+'\')">'+chips[i]+'</button>';}el.innerHTML=h;}
  calcProfit();
};

function runChip(k){document.getElementById('sup-q').value=k;doSupplier();}

function sbox(l,v,c){return '<div class="sbox"><div class="lbl">'+l+'</div><div class="mono" style="font-size:16px;color:'+(c||'var(--tx)')+';font-weight:600">'+(v||'--')+'</div></div>';}
function pbar(p,c,h){h=h||5;return '<div class="pbar" style="height:'+h+'px"><div class="pbf" style="width:'+Math.min(100,p||0)+'%;background:'+(c||'var(--gd)')+';height:'+h+'px"></div></div>';}
function demandColor(d){return d==='High'?'var(--ol)':d==='Medium'?'var(--gd)':'var(--rd)';}

function platformLinks(kw){
  var k=encodeURIComponent(kw);
  var links=[
    {name:'Etsy UK',url:'https://www.etsy.com/uk/search?q='+k,icon:'🛍'},
    {name:'Etsy USA',url:'https://www.etsy.com/search?q='+k,icon:'🛍'},
    {name:'Printify',url:'https://printify.com/app/products?search='+k,icon:'🖨'},
    {name:'Printful',url:'https://www.printful.com/uk/custom/search?q='+k,icon:'🖨'},
    {name:'Gelato',url:'https://www.gelato.com/gb/en/catalogue?q='+k,icon:'🖨'},
    {name:'Pinterest',url:'https://www.pinterest.co.uk/search/pins/?q='+k,icon:'📌'},
    {name:'Amazon UK',url:'https://www.amazon.co.uk/s?k='+k,icon:'📦'}
  ];
  var html='<div class="card" style="margin-bottom:16px;border:2px solid var(--olbr)">';
  html+='<div class="lbl" style="color:var(--ol)">See Real Products On Every Platform</div>';
  html+='<p style="font-size:12px;color:var(--mu);margin-bottom:12px">Click to see real <strong>'+kw+'</strong> products and prices right now</p>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  for(var i=0;i<links.length;i++){html+='<a href="'+links[i].url+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--w);border:1.5px solid var(--b1);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--tx);text-decoration:none;font-family:Jost,sans-serif;">'+links[i].icon+' '+links[i].name+'</a>';}
  html+='</div></div>';return html;
}

function calcProfit(){
  var base=parseFloat(document.getElementById('c-base').value)||0;
  var uk=parseFloat(document.getElementById('c-uk').value)||0;
  var ads=parseFloat(document.getElementById('c-ads').value)||0;
  var fee=uk*0.065;
  var listing=0.18;
  var profit=uk-base-fee-listing-ads;
  var mp=uk>0?((profit/uk)*100).toFixed(1):0;
  var pc=profit>5?'var(--ol)':profit>0?'var(--gd)':'var(--rd)';
  var rows=[
    ['UK Sell Price','£'+uk.toFixed(2),'var(--tx)'],
    ['Etsy Fee 6.5%','-£'+fee.toFixed(2),'var(--rd)'],
    ['Listing Fee','-£0.18','var(--rd)'],
    ['Base Cost','-£'+base.toFixed(2),'var(--rd)'],
    ['Etsy Ads',ads>0?'-£'+ads.toFixed(2):'£0','var(--rd)'],
    ['Your Profit','£'+profit.toFixed(2),pc],
    ['Margin',mp+'%',pc]
  ];
  var html='';
  for(var i=0;i<rows.length;i++){
    html+=sbox(rows[i][0],rows[i][1],rows[i][2]);
  }
  document.getElementById('calc-out').innerHTML=html;
}

async function callAI(prompt){
  var r=await fetch('/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})});
  var d=await r.json();
  if(!r.ok)throw new Error(d.error||'Server error '+r.status);
  return d;
}

async function getPrintify(kw){
  try{
    var r=await fetch('https://api.printify.com/v1/catalog/blueprints.json');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    return(d||[]).filter(function(p){return p.title&&p.title.toLowerCase().includes(kl);}).slice(0,5);
  }catch(e){return[];}
}

async function getPrintful(kw){
  try{
    var r=await fetch('https://api.printful.com/products');
    if(!r.ok)return[];
    var d=await r.json();var kl=kw.toLowerCase().split(' ')[0];
    return(d.result||[]).filter(function(p){return p.type_name&&p.type_name.toLowerCase().includes(kl);}).slice(0,5);
  }catch(e){return[];}
}

async function doSupplier(){
  var q=document.getElementById('sup-q').value.trim();
  if(!q)return;
  var res=document.getElementById('sup-res');
  res.innerHTML='<div class="card"><div class="loading-row"><div class="spin"></div>Fetching real costs from Printify, Printful and Gelato...</div></div>';

  var pfy=await getPrintify(q);
  var pfl=await getPrintful(q);

  try{
    var d=await callAI('Real base costs for "'+q+'" on Printify Printful Gelato. Real Etsy selling prices globally. Return JSON: {"product":"'+q+'","printify":[{"variant":"specific variant","baseCost":"£X","printArea":"size","shipsTo":"Worldwide","notes":"key info"}],"printful":[{"variant":"specific variant","baseCost":"£X","printArea":"size","shipsTo":"Worldwide","notes":"key info"}],"gelato":[{"variant":"specific variant","baseCost":"£X","deliveryUK":"X-Y days","notes":"key info"}],"etsyPricing":{"UK":"£X avg","USA":"$X avg","Germany":"€X avg","Australia":"AU$X avg"},"bestSetup":{"platform":"Printify","variant":"exact variant","baseCost":"£X","ukPrice":"£X","usaPrice":"$X","euPrice":"€X","netProfitUK":"£X","marginPct":"X%","breakEven":5,"whyBest":"specific reason"},"demandByMarket":{"UK":"High","USA":"High","Germany":"Medium","Australia":"Medium"},"comparison":{"printifyPro":"main advantage","printifyMinus":"main disadvantage","printfulPro":"main advantage","printfulMinus":"main disadvantage","gelatoPro":"main advantage","gelatoMinus":"main disadvantage"},"tips":["specific tip 1","specific tip 2","specific tip 3"]}');

    var b=parseFloat((d.bestSetup&&d.bestSetup.baseCost||'0').replace('£',''))||0;
    var uk=parseFloat((d.bestSetup&&d.bestSetup.ukPrice||'0').replace('£',''))||0;
    var us=parseFloat((d.bestSetup&&d.bestSetup.usaPrice||'0').replace('$',''))||0;
    var eu=parseFloat((d.bestSetup&&d.bestSetup.euPrice||'0').replace('€',''))||0;
    document.getElementById('c-base').value=b;
    document.getElementById('c-uk').value=uk;
    document.getElementById('c-us').value=us;
    document.getElementById('c-eu').value=eu;
    calcProfit();

    var html=platformLinks(q);

    html+='<div class="card-live fu"><div class="lbl" style="color:var(--ol)">⭐ Best Setup — '+(d.bestSetup&&d.bestSetup.platform||'')+'</div>';
    html+='<div class="serif" style="font-size:20px;font-weight:600;margin-bottom:14px">'+(d.product||q)+'</div>';
    html+='<div class="grid-auto" style="margin-bottom:14px">';
    html+=sbox('Platform',d.bestSetup&&d.bestSetup.platform,'var(--bl)');
    html+=sbox('Base Cost',d.bestSetup&&d.bestSetup.baseCost,'var(--mu)');
    html+=sbox('UK Price',d.bestSetup&&d.bestSetup.ukPrice,'var(--gd)');
    html+=sbox('USA Price',d.bestSetup&&d.bestSetup.usaPrice,'var(--gd)');
    html+=sbox('Net Profit UK',d.bestSetup&&d.bestSetup.netProfitUK,'var(--ol)');
    html+=sbox('Margin',d.bestSetup&&d.bestSetup.marginPct,'var(--ol)');
    html+=sbox('Break Even',d.bestSetup&&d.bestSetup.breakEven+' sales','var(--mu)');
    html+='</div>';
    html+='<p style="font-size:13px;color:var(--mu)">'+(d.bestSetup&&d.bestSetup.whyBest||'')+'</p></div>';

    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px" class="d1">';
    var platforms=[
      ['🖨️ Printify',d.printify,'var(--bl)',d.comparison&&d.comparison.printifyPro,d.comparison&&d.comparison.printifyMinus],
      ['🖨️ Printful',d.printful,'var(--gd)',d.comparison&&d.comparison.printfulPro,d.comparison&&d.comparison.printfulMinus],
      ['🖨️ Gelato',d.gelato,'var(--ol)',d.comparison&&d.comparison.gelatoPro,d.comparison&&d.comparison.gelatoMinus]
    ];
    for(var i=0;i<platforms.length;i++){
      var row=platforms[i];
      html+='<div class="card"><div class="lbl" style="color:'+row[2]+'">'+row[0]+'</div>';
      var variants=row[1]||[];
      for(var j=0;j<variants.length;j++){
        var v=variants[j];
        html+='<div style="padding:10px 0;border-bottom:1px solid var(--b1)">';
        html+='<div style="font-weight:600;font-size:13px;margin-bottom:4px">'+v.variant+'</div>';
        html+='<div class="mono" style="color:'+row[2]+';font-weight:700;font-size:15px">'+v.baseCost+'</div>';
        html+='<div style="font-size:11px;color:var(--mu);margin-top:3px">'+(v.shipsTo||v.deliveryUK||'')+' · '+(v.notes||'')+'</div></div>';
      }
      html+='<div style="margin-top:10px">';
      if(row[3])html+='<div style="font-size:11px;color:var(--gn);margin-bottom:4px">✓ '+row[3]+'</div>';
      if(row[4])html+='<div style="font-size:11px;color:var(--rd)">✗ '+row[4]+'</div>';
      html+='</div></div>';
    }
    html+='</div>';

    html+='<div class="card d2"><div class="lbl">🌍 Etsy Pricing + Demand by Market</div><div class="grid-auto">';
    var markets=[['UK','🇬🇧',d.etsyPricing&&d.etsyPricing.UK],['USA','🇺🇸',d.etsyPricing&&d.etsyPricing.USA],['Germany','🇩🇪',d.etsyPricing&&d.etsyPricing.Germany],['Australia','🇦🇺',d.etsyPricing&&d.etsyPricing.Australia]];
    var dem=d.demandByMarket||{};
    for(var i=0;i<markets.length;i++){
      var m=markets[i];
      html+='<div class="sbox"><div class="lbl">'+m[1]+' '+m[0]+'</div>';
      html+='<div class="mono" style="color:var(--gd);font-weight:700;font-size:15px">'+(m[2]||'—')+'</div>';
      html+='<div style="font-size:11px;color:'+demandColor(dem[m[0]]||'Medium')+';margin-top:4px">'+(dem[m[0]]||'—')+' demand</div></div>';
    }
    html+='</div></div>';

    if(pfy.length||pfl.length){
      html+='<div class="card d2"><div class="lbl">Real Catalogue Products Found</div>';
      if(pfy.length){html+='<div style="margin-bottom:8px"><strong style="font-size:12px;margin-right:6px">Printify:</strong>';for(var i=0;i<pfy.length;i++){html+='<span class="pill">'+pfy[i].title+'</span>';}html+='</div>';}
      if(pfl.length){html+='<div><strong style="font-size:12px;margin-right:6px">Printful:</strong>';for(var i=0;i<pfl.length;i++){html+='<span class="pill">'+pfl[i].type_name+'</span>';}html+='</div>';}
      html+='</div>';
    }

    html+='<div class="card-gold d3"><div class="lbl" style="color:var(--gd)">💡 Pro Tips</div>';
    var tips=d.tips||[];
    for(var i=0;i<tips.length;i++){html+='<div style="display:flex;gap:8px;margin-bottom:10px;font-size:13px;line-height:1.6"><span style="color:var(--gd);font-weight:700">→</span><span style="color:var(--mu)">'+tips[i]+'</span></div>';}
    html+='</div>';

    res.innerHTML=html;
  }catch(e){
    res.innerHTML='<div class="card-red"><strong>Error:</strong> '+e.message+'</div>';
  }
}
</script>
</body>
</html>
